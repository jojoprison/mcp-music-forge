services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    network_mode: host
    env_file: .env.prod
    environment:
      - TZ=${TZ:-UTC}
      - STORAGE_DIR=/app/data
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://127.0.0.1:6379/5
      - API_BASE_URL=http://127.0.0.1:8033
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 300M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    network_mode: host
    env_file: .env.prod
    environment:
      - TZ=${TZ:-UTC}
      - STORAGE_DIR=/app/data
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://127.0.0.1:6379/5
    volumes:
      - ./data:/app/data
    command: ["arq", "workers.tasks.WorkerSettings"]
    deploy:
      resources:
        limits:
          memory: 512M
